{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar</title>
    <link rel="stylesheet" type="text/css" href="{% static 'home.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'addmoney.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'modern-styles.css' %}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/js/all.min.js" crossorigin="anonymous"></script>
</head>
<body>


    <nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
        <a class="navbar-brand" href="/index">Expense Tracker</a>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" id="userDropdown" href="#" role="button" data-toggle="dropdown">
                    <i class="fas fa-user fa-fw"></i>
                </a>
                <div class="dropdown-menu dropdown-menu-right" aria-labelledby="userDropdown">
                    
                    <div class="dropdown-divider"></div>
                    <a class="dropdown-item" href="/handleLogout">Logout</a>
                </div>
            </li>
        </ul>
    </nav>

    <div class="left-sidebar" style="width: 250px; height: 100vh; position: fixed; top: 0; left: 0; background-color: #343a40; color: white; padding-top: 20px;">
        <nav class="sb-sidenav accordion sb-sidenav-dark">
            <div class="sb-sidenav-menu" style="margin-top: 30px;">
                <div class="nav">
                    <div class="sb-sidenav-menu-heading">Core</div>
                    <a class="nav-link" href="/index">
                        <div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>
                        DASHBOARD
                    </a>
                    <a class="nav-link" href="/profile">
                        <i class="glyphicon glyphicon-user"></i> PROFILE
                    </a>
                    <div class="sb-sidenav-menu-heading">Records</div>
                    <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapsePages">
                        <div class="sb-nav-link-icon"><i class="fas fa-book-open"></i></div>
                        RECORD
                        <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
                    </a>
                    <div class="collapse" id="collapsePages">
                        <nav class="sb-sidenav-menu-nested nav accordion">
                            <a class="nav-link" href="/weekly">WEEKLY RECORD</a>
                            <a class="nav-link" href="/stats">MONTHLY RECORD</a>
                        </nav>
                    </div>
                    <a class="nav-link" href="/info">
                        <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                        YEARLY RECORD
                    </a>
                    <a class="nav-link" href="/tables">
                        <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                        HISTORY
                    </a>
                    <a class="nav-link" href="/handleLogout">
                        <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                        LOGOUT
                    </a>
                </div>
            </div>
            <div class="sb-sidenav-footer">
                <div class="small">Logged in as:</div>
                {{ request.user.username }}
            </div>
        </nav>
    </div>
    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
