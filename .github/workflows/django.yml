name: Django DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  prebuild_stage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install OS Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip wget

      - name: Install Java 17
        run: |
          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb
          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb
          java -version


  pylint_stage:
    runs-on: ubuntu-latest
    needs: prebuild_stage

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint coverage

      - name: Run Pylint
        continue-on-error: true
        run: |
          pylint $(git ls-files '*.py' | grep -Ev 'migrations|\.c9') || true

      - name: Run Django Tests
        run: |
          coverage run --source='.' manage.py test
          coverage xml -i

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  deploy_stage:
    runs-on: ubuntu-latest
    needs: pylint_stage

    steps:
      - name: Download Deployment Package
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          application_name: expense-tracker
          environment_name: Expense-tracker-env
          region: us-east-1
          use_existing_version_if_available: true
          version_label: "build-${{ github.run_number }}"
          deployment_package: deploy.zip
          wait_for_deployment: false
